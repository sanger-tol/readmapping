custom_logo: "sanger-tol-readmapping_logo.png"
custom_logo_url: https://github.com/sanger-tol/readmapping
custom_logo_title: "sanger-tol/readmapping"

intro_text: >
  This report summarizes data quality checks, processing steps, and key alignment results generated by the
  <a href="https://github.com/sanger-tol/readmapping" target="_blank" rel="noopener"><strong>sanger-tol/readmapping</strong></a> pipeline.
report_comment: >
  This report has been generated by the <a href="https://github.com/sanger-tol/readmapping" target="_blank">sanger-tol/readmapping</a> analysis pipeline. For information about interpreting these results and details of the workflow, please see the <a href="https://github.com/sanger-tol/readmapping#readme" target="_blank">documentation</a>.

report_section_order:
  "sanger-tol-readmapping-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "sanger-tol-readmapping-summary":
    order: -1002

export_plots: true

extra_fn_clean_exts:
  - type: regex
    pattern: ".*(?=(ont|illumina|pacbio|hic)\\.)"

custom_plot_config:
  samtools_alignment_plot:
    cpswitch_c_active: false
